<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>3D 지형 뷰어</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/ol@8.2.0/ol.css">
  <script src="https://cdn.jsdelivr.net/npm/ol@8.2.0/dist/ol.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: sans-serif; background: #1a1a2e; color: white; }
    h1 { text-align: center; padding: 14px; font-size: 1.3rem; color: #a0c4ff; }
    .top {
      display: flex; justify-content: center; align-items: center;
      gap: 10px; padding: 8px;
    }
    input {
      width: 320px; padding: 10px; border-radius: 8px;
      border: none; font-size: 1rem;
    }
    button {
      padding: 10px 18px; background: #4a90e2; color: white;
      border: none; border-radius: 8px; cursor: pointer; font-size: 1rem;
    }
    button:hover { background: #357abd; }
    .tabs {
      display: flex; justify-content: center; gap: 8px; padding: 6px;
    }
    .tab {
      padding: 6px 16px; border-radius: 6px; cursor: pointer;
      background: #2a2a4a; border: 1px solid #4a90e2; color: #a0c4ff;
    }
    .tab.active { background: #4a90e2; color: white; }
    .map-type-btns {
      display: flex; justify-content: center; gap: 6px; padding: 4px;
    }
    .mtype {
      padding: 4px 12px; border-radius: 5px; cursor: pointer; font-size: 0.85rem;
      background: #2a2a4a; border: 1px solid #6a6a8a; color: #ccc;
    }
    .mtype.active { background: #6a4ae2; color: white; border-color: #6a4ae2; }
    #map { width: 100%; height: calc(100vh - 200px); }
    #imap { width: 100%; height: calc(100vh - 160px); border: none; display: none; }
  </style>
</head>
<body>
  <h1>🗺️ 3D 지형 뷰어</h1>
  <div class="top">
    <input id="addr" type="text" placeholder="주소 입력 (예: 서울특별시 중구 세종대로 110)">
    <button onclick="search()">검색</button>
  </div>
  <div class="tabs">
    <div class="tab active" onclick="switchMap('vworld', this)">브이월드</div>
    <div class="tab" onclick="switchMap('kakao', this)">카카오맵</div>
    <div class="tab" onclick="switchMap('naver', this)">네이버지도</div>
  </div>
  <div class="map-type-btns" id="mapTypeBtns">
    <div class="mtype active" onclick="switchLayer('base', this)">일반</div>
    <div class="mtype" onclick="switchLayer('satellite', this)">위성</div>
    <div class="mtype" onclick="switchLayer('hybrid', this)">하이브리드</div>
  </div>
  <div id="map"></div>
  <iframe id="imap" src=""></iframe>

        })

        })
      })
    };

      })
    });
