<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>3D 지형 뷰어</title>
  <script src="https://map.vworld.kr/js/webglMapInit.js.do?version=2.0&apiKey=B646FA6C-D6EF-3AD0-A733-6F07266A5FD5"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: sans-serif; background: #1a1a2e; color: white; }
    h1 { text-align: center; padding: 14px; font-size: 1.3rem; color: #a0c4ff; }
    .top {
      display: flex; justify-content: center; align-items: center;
      gap: 10px; padding: 8px;
    }
    input {
      width: 320px; padding: 10px; border-radius: 8px;
      border: none; font-size: 1rem;
    }
    button {
      padding: 10px 18px; background: #4a90e2; color: white;
      border: none; border-radius: 8px; cursor: pointer; font-size: 1rem;
    }
    button:hover { background: #357abd; }
    .tabs {
      display: flex; justify-content: center; gap: 8px; padding: 6px;
    }
    .tab {
      padding: 6px 16px; border-radius: 6px; cursor: pointer;
      background: #2a2a4a; border: 1px solid #4a90e2; color: #a0c4ff;
    }
    .tab.active { background: #4a90e2; color: white; }
    #vmap { width: 100%; height: calc(100vh - 160px); }
    #imap { width: 100%; height: calc(100vh - 160px); border: none; display: none; }
  </style>
</head>
<body>
  <h1>🗺️ 3D 지형 뷰어</h1>
  <div class="top">
    <input id="addr" type="text" placeholder="주소 입력 (예: 서울특별시 중구 세종대로 110)">
    <button onclick="search()">검색</button>
  </div>
  <div class="tabs">
    <div class="tab active" onclick="switchMap('vworld', this)">브이월드</div>
    <div class="tab" onclick="switchMap('kakao', this)">카카오맵</div>
    <div class="tab" onclick="switchMap('naver', this)">네이버지도</div>
  </div>
  <div id="vmap"></div>
  <iframe id="imap" src=""></iframe>

  <script>
    const API_KEY = 'B646FA6C-D6EF-3AD0-A733-6F07266A5FD5';
    let currentMap = 'vworld';
    let map;

    // 브이월드 지도 초기화
    window.onload = function() {
      map = new vw.Map();
      map.setOption({
        mapId: 'vmap',
        initPosition: new vw.CameraPosition(
          new vw.CoordZ(126.978271, 37.566643, 1000),
          new vw.Direction(0, -45, 0)
        ),
        logo: false,
        navigation: true
      });
    };

    function switchMap(type, el) {
      currentMap = type;
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      el.classList.add('active');

      const vmap = document.getElementById('vmap');
      const imap = document.getElementById('imap');

      if (type === 'vworld') {
        vmap.style.display = 'block';
        imap.style.display = 'none';
      } else {
        vmap.style.display = 'none';
        imap.style.display = 'block';
        if (type === 'kakao') imap.src = 'https://map.kakao.com/';
        else if (type === 'naver') imap.src = 'https://map.naver.com/';
      }
    }

    function search() {
      const addr = document.getElementById('addr').value;
      if (!addr) return alert('주소를 입력해주세요!');
      const encoded = encodeURIComponent(addr);

      if (currentMap === 'vworld') {
        // 브이월드 주소 검색
        fetch(`https://api.vworld.kr/req/address?service=address&request=getcoord&crs=epsg:4326&address=${encoded}&format=json&type=ROAD&key=${API_KEY}`)
          .then(r => r.json())
          .then(data => {
            const pt = data.response.result.point;
            map.setPosition(new vw.CameraPosition(
              new vw.CoordZ(parseFloat(pt.x), parseFloat(pt.y), 500),
              new vw.Direction(0, -45, 0)
            ));
          })
          .catch(() => alert('주소를 찾을 수 없어요!'));
      } else if (currentMap === 'kakao') {
        document.getElementById('imap').src = `https://map.kakao.com/?q=${encoded}`;
      } else if (currentMap === 'naver') {
        document.getElementById('imap').src = `https://map.naver.com/v5/search/${encoded}`;
      }
    }

    document.getElementById('addr').addEventListener('keydown', e => {
      if (e.key === 'Enter') search();
    });
  </script>
</body>
</html>
