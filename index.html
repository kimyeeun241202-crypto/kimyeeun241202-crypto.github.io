<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>3D 지형 뷰어</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/ol@8.2.0/ol.css">
  <script src="https://cdn.jsdelivr.net/npm/ol@8.2.0/dist/ol.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Apple SD Gothic Neo', sans-serif; background: #f5f5f5; display: flex; height: 100vh; overflow: hidden; }

    /* 왼쪽 사이드바 */
    .sidebar {
      width: 300px; min-width: 300px; background: white;
      box-shadow: 2px 0 8px rgba(0,0,0,0.1);
      display: flex; flex-direction: column;
      z-index: 10;
    }
    .sidebar-header {
      padding: 20px;
      border-bottom: 1px solid #eee;
    }
    .sidebar-header h1 {
      font-size: 1.1rem; font-weight: 700; color: #222;
      margin-bottom: 12px;
    }
    .search-wrap {
      display: flex; gap: 6px;
    }
    .search-wrap input {
      flex: 1; padding: 9px 12px; border: 1px solid #ddd;
      border-radius: 6px; font-size: 0.9rem; outline: none;
      color: #333;
    }
    .search-wrap input:focus { border-color: #4a90e2; }
    .search-wrap button {
      padding: 9px 14px; background: #4a90e2; color: white;
      border: none; border-radius: 6px; cursor: pointer;
      font-size: 0.9rem; font-weight: 600;
    }
    .search-wrap button:hover { background: #357abd; }

    .sidebar-section {
      padding: 16px 20px;
      border-bottom: 1px solid #eee;
    }
    .sidebar-section label {
      font-size: 0.8rem; color: #888; font-weight: 600;
      display: block; margin-bottom: 8px; text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .result-addr {
      font-size: 0.85rem; color: #444; line-height: 1.5;
      min-height: 20px;
    }

    /* 오른쪽 지도 영역 */
    .map-wrap {
      flex: 1; position: relative;
    }

    /* 오른쪽 상단 지도 선택 드롭다운 */
    .map-selector {
      position: absolute; top: 14px; right: 14px; z-index: 100;
    }
    .map-selector select {
      padding: 8px 14px; border-radius: 8px;
      border: 1px solid #ddd; background: white;
      font-size: 0.9rem; color: #333;
      box-shadow: 0 2px 8px rgba(0,0,0,0.15);
      cursor: pointer; outline: none;
    }

    /* 레이어 버튼 (브이월드용) */
    .layer-btns {
      position: absolute; top: 14px; right: 160px; z-index: 100;
      display: flex; gap: 4px;
    }
    .layer-btn {
      padding: 7px 12px; border-radius: 6px; cursor: pointer;
      background: white; border: 1px solid #ddd;
      font-size: 0.85rem; color: #555;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    }
    .layer-btn.active {
      background: #4a90e2; color: white; border-color: #4a90e2;
    }

    #map { width: 100%; height: 100%; }
    #imap { width: 100%; height: 100%; border: none; display: none; position: absolute; top: 0; left: 0; }
  </style>
</head>
<body>

  <!-- 왼쪽 사이드바 -->
  <div class="sidebar">
    <div class="sidebar-header">
      <h1>🗺️ 3D 지형 뷰어</h1>
      <div class="search-wrap">
        <input id="addr" type="text" placeholder="주소 입력">
        <button onclick="search()">검색</button>
      </div>
    </div>
    <div class="sidebar-section">
      <label>검색 결과</label>
      <div class="result-addr" id="resultAddr">주소를 검색해주세요</div>
    </div>
  </div>

  <!-- 오른쪽 지도 -->
  <div class="map-wrap">
    <div class="layer-btns" id="layerBtns">
      <div class="layer-btn active" onclick="switchLayer('base', this)">일반</div>
      <div class="layer-btn" onclick="switchLayer('satellite', this)">위성</div>
      <div class="layer-btn" onclick="switchLayer('hybrid', this)">하이브리드</div>
    </div>
    <div class="map-selector">
      <select onchange="switchMap(this.value)">
        <option value="vworld">브이월드</option>
        <option value="kakao">카카오맵</option>
        <option value="naver">네이버지도</option>
      </select>
    </div>
    <div id="map"></div>
    <iframe id="imap" src=""></iframe>
  </div>

  <script>
    const API_KEY = 'B646FA6C-D6EF-3AD0-A733-6F07266A5FD5';
    let currentMap = 'vworld';

    const layers = {
      base: new ol.layer.Tile({
        source: new ol.source.XYZ({
          url: `https://api.vworld.kr/req/wmts/1.0.0/${API_KEY}/Base/{z}/{y}/{x}.png`
        })
      }),
      satellite: new ol.layer.Tile({
        visible: false,
        source: new ol.source.XYZ({
          url: `https://api.vworld.kr/req/wmts/1.0.0/${API_KEY}/Satellite/{z}/{y}/{x}.jpeg`
        })
      }),
      hybrid: new ol.layer.Tile({
        visible: false,
        source: new ol.source.XYZ({
          url: `https://api.vworld.kr/req/wmts/1.0.0/${API_KEY}/Hybrid/{z}/{y}/{x}.png`
        })
      })
    };

    const map = new ol.Map({
      target: 'map',
      layers: [layers.base, layers.satellite, layers.hybrid],
      view: new ol.View({
        center: ol.proj.fromLonLat([126.978271, 37.566643]),
        zoom: 15
      })
    });

    function switchLayer(type, el) {
      document.querySelectorAll('.layer-btn').forEach(t => t.classList.remove('active'));
      el.classList.add('active');
      layers.base.setVisible(type === 'base');
      layers.satellite.setVisible(type === 'satellite');
      layers.hybrid.setVisible(type === 'hybrid');
    }

    function switchMap(type) {
      currentMap = type;
      const vmap = document.getElementById('map');
      const imap = document.getElementById('imap');
      const layerBtns = document.getElementById('layerBtns');

      if (type === 'vworld') {
        vmap.style.display = 'block';
        imap.style.display = 'none';
        layerBtns.style.display = 'flex';
        map.updateSize();
      } else {
        vmap.style.display = 'none';
        imap.style.display = 'block';
        layerBtns.style.display = 'none';
        if (type === 'kakao') imap.src = 'https://map.kakao.com/';
        else if (type === 'naver') imap.src = 'https://map.naver.com/';
      }
    }

    function search() {
      const addr = document.getElementById('addr').value;
      if (!addr) return alert('주소를 입력해주세요!');
      const encoded = encodeURIComponent(addr);

      if (currentMap === 'vworld') {
        fetch(`https://api.vworld.kr/req/address?service=address&request=getcoord&crs=epsg:4326&address=${encoded}&format=json&type=ROAD&key=${API_KEY}`)
          .then(r => r.json())
          .then(data => {
            const pt = data.response.result.point;
            document.getElementById('resultAddr').textContent = addr;
            map.getView().animate({
              center: ol.proj.fromLonLat([parseFloat(pt.x), parseFloat(pt.y)]),
              zoom: 17,
              duration: 800
            });
          })
          .catch(() => alert('주소를 찾을 수 없어요!'));
      } else if (currentMap === 'kakao') {
        document.getElementById('imap').src = `https://map.kakao.com/?q=${encoded}`;
        document.getElementById('resultAddr').textContent = addr;
      } else if (currentMap === 'naver') {
        document.getElementById('imap').src = `https://map.naver.com/v5/search/${encoded}`;
        document.getElementById('resultAddr').textContent = addr;
      }
    }

    document.getElementById('addr').addEventListener('keydown', e => {
      if (e.key === 'Enter') search();
    });
  </script>
</body>
</html>
